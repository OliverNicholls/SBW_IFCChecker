<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC Checker</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue:    #1976d2;
        --green:   #2e7d32;
        --red:     #c62828;
        --amber:   #e65100;
        --green-bg:#e8f5e9;
        --red-bg:  #ffebee;
        --amber-bg:#fff3e0;
        --border:  #e0e0e0;
        --text:    #212121;
        --muted:   #757575;
        --surface: #ffffff;
        --bg:      #f5f5f5;
        --radius:  6px;
      }

      html, body { height: 100%; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* ── Layout ─────────────────────────────────────── */
      .widget {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--surface);
        border-left: 4px solid var(--blue);
      }

      header {
        flex-shrink: 0;
        padding: 12px 16px 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-size: 16px;
        font-weight: 700;
        color: var(--blue);
        margin-bottom: 10px;
      }

      main {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      /* ── Tabs ───────────────────────────────────────── */
      .tabs {
        display: flex;
        gap: 0;
      }

      .tab {
        padding: 8px 16px;
        border: none;
        background: none;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
      }

      .tab:hover { color: var(--blue); }

      .tab.active {
        color: var(--blue);
        border-bottom-color: var(--blue);
      }

      .badge {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        margin-left: 4px;
        vertical-align: middle;
      }

      .badge.pass { background: var(--green-bg); color: var(--green); }
      .badge.fail { background: var(--red-bg);   color: var(--red);   }

      /* ── Sections ───────────────────────────────────── */
      section {
        margin-bottom: 20px;
      }

      section h2 {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 10px;
      }

      /* ── Form elements ──────────────────────────────── */
      label {
        display: block;
        font-weight: 500;
        margin-bottom: 4px;
        color: var(--text);
      }

      select, input[type="file"] {
        width: 100%;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 13px;
        font-family: inherit;
        background: var(--surface);
        color: var(--text);
        margin-bottom: 10px;
      }

      select:focus {
        outline: none;
        border-color: var(--blue);
        box-shadow: 0 0 0 2px rgba(25,118,210,0.15);
      }

      .divider {
        text-align: center;
        color: var(--muted);
        font-size: 11px;
        margin: 6px 0;
        position: relative;
      }

      .divider::before, .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 42%;
        height: 1px;
        background: var(--border);
      }

      .divider::before { left: 0; }
      .divider::after  { right: 0; }

      .loaded {
        font-size: 12px;
        color: var(--green);
        font-weight: 500;
        padding: 6px 10px;
        background: var(--green-bg);
        border-radius: var(--radius);
        margin-top: 4px;
      }

      /* ── Spec list ──────────────────────────────────── */
      .spec-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .spec-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        font-weight: normal;
      }

      .spec-row:hover { border-color: #bdbdbd; }
      .spec-row input[type="checkbox"] { cursor: pointer; flex-shrink: 0; }
      .spec-name { flex: 1; font-weight: 500; }
      .spec-meta { font-size: 11px; color: var(--muted); white-space: nowrap; }
      .spec-desc { font-size: 11px; color: var(--muted); padding: 2px 10px 6px 28px; }

      /* ── Scope ──────────────────────────────────────── */
      .scope-toggle {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .scope-option {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: normal;
        cursor: pointer;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .scope-option:hover { border-color: #bdbdbd; }
      .scope-option input[type="radio"] { cursor: pointer; }

      /* ── Buttons ────────────────────────────────────── */
      .actions { margin-top: 4px; }

      .btn-primary {
        width: 100%;
        padding: 10px;
        background: var(--blue);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s;
      }

      .btn-primary:hover:not(:disabled) {
        background: #1565c0;
        box-shadow: 0 2px 8px rgba(25,118,210,0.3);
      }

      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-secondary {
        padding: 7px 14px;
        background: #f5f5f5;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn-secondary:hover { background: #eeeeee; }

      .btn-text {
        padding: 4px 8px;
        background: none;
        color: var(--blue);
        border: none;
        font-size: 12px;
        cursor: pointer;
        text-decoration: underline;
      }

      /* ── Summary ────────────────────────────────────── */
      .summary {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }

      .stat {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px;
        text-align: center;
      }

      .stat.pass { background: var(--green-bg); border-color: #a5d6a7; }
      .stat.fail { background: var(--red-bg);   border-color: #ef9a9a; }

      .stat-value {
        display: block;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.2;
      }

      .stat.pass .stat-value { color: var(--green); }
      .stat.fail .stat-value { color: var(--red);   }

      .stat-label {
        display: block;
        font-size: 10px;
        color: var(--muted);
        margin-top: 2px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      /* ── Result actions ─────────────────────────────── */
      .result-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      /* ── Result cards ───────────────────────────────── */
      .result-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .result-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .result-card.pass          { border-left: 3px solid #4caf50; }
      .result-card.fail          { border-left: 3px solid #f44336; }
      .result-card.error         { border-left: 3px solid #ff9800; }
      .result-card.not_applicable{ border-left: 3px solid #9e9e9e; }

      .result-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        cursor: pointer;
        user-select: none;
        background: rgba(0,0,0,0.02);
      }

      .result-header:hover { background: rgba(0,0,0,0.04); }

      .result-icon { font-size: 14px; font-weight: 700; flex-shrink: 0; }
      .result-card.pass  .result-icon { color: #4caf50; }
      .result-card.fail  .result-icon { color: #f44336; }
      .result-card.error .result-icon { color: #ff9800; }

      .result-title { flex: 1; font-weight: 500; }
      .result-stats { font-size: 11px; color: var(--muted); white-space: nowrap; }
      .chevron { font-size: 10px; color: var(--muted); }

      .result-body {
        padding: 12px;
        border-top: 1px solid rgba(0,0,0,0.06);
      }

      .result-body[hidden] { display: none; }

      .error-msg { color: var(--red); font-size: 12px; margin-bottom: 8px; }

      /* ── Object lists ───────────────────────────────── */
      .obj-list { margin-top: 8px; }

      .obj-list h4 {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .obj-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 4px 12px;
        align-items: start;
        padding: 6px 8px;
        border-radius: 4px;
        cursor: pointer;
        margin-bottom: 4px;
        transition: background 0.1s;
      }

      .obj-row:hover { background: rgba(0,0,0,0.05); }
      .obj-row.fail  { background: rgba(244,67,54,0.04); }
      .obj-row.pass  { background: rgba(76,175,80,0.04); }

      .obj-name { font-weight: 500; grid-column: 1; }

      .obj-guid {
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 10px;
        color: var(--muted);
        grid-column: 2;
        padding-top: 1px;
      }

      .reasons {
        grid-column: 1 / -1;
        list-style: none;
        padding-left: 12px;
        margin-top: 2px;
      }

      .reasons li {
        font-size: 11px;
        color: var(--red);
        padding: 1px 0;
        line-height: 1.4;
      }

      .reasons li::before { content: '• '; }

      .passed-details {
        margin-top: 10px;
        border-top: 1px solid var(--border);
        padding-top: 10px;
      }

      .passed-details summary {
        font-size: 12px;
        color: var(--muted);
        cursor: pointer;
        font-weight: 500;
      }

      .passed-details summary:hover { color: var(--text); }

      /* ── Status bar ─────────────────────────────────── */
      .status-bar {
        flex-shrink: 0;
        min-height: 32px;
        padding: 6px 16px;
        font-size: 12px;
        font-weight: 500;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
      }

      .status-bar.info    { background: #e3f2fd; color: #1565c0; }
      .status-bar.success { background: var(--green-bg); color: var(--green); }
      .status-bar.error   { background: var(--red-bg);   color: var(--red);   }
      .status-bar.warn    { background: var(--amber-bg); color: var(--amber); }

      /* ── Utilities ──────────────────────────────────── */
      .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
      .muted { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="index.ts"></script>
  </body>
</html>
