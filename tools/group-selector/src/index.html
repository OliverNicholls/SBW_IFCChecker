<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDS Validator - StreamBIM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .widget-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: white;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #222;
      font-weight: 600;
    }

    h2 {
      font-size: 14px;
      margin: 16px 0 12px;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 24px;
      padding: 12px;
      background: #fafafa;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }

    .label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #555;
    }

    .info {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .instruction {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
      padding: 8px;
      background: #f0f0f0;
      border-radius: 3px;
      border-left: 3px solid #2196F3;
    }

    .result-info {
      background: white;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    .result-info p {
      margin: 6px 0;
      font-size: 13px;
    }

    .result-info strong {
      color: #333;
    }

    .count {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    .input-field:focus {
      outline: none;
      border-color: #2196F3;
      box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
    }

    select.input-field {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 20px;
      padding-right: 32px;
    }

    select.input-field:disabled {
      background-color: #f5f5f5;
      color: #999;
      cursor: not-allowed;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #2196F3;
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      background: #1976D2;
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-secondary {
      background: #757575;
      color: white;
      width: 100%;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #616161;
    }

    .btn-secondary:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-danger {
      background: #f44336;
      color: white;
    }

    .btn-danger:hover {
      background: #da190b;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      width: auto;
    }

    .groups-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .group-item {
      padding: 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .group-item:hover {
      border-color: #2196F3;
      background: #f8f9fa;
    }

    .group-item.selected {
      border-color: #2196F3;
      background: #e3f2fd;
    }

    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .group-name {
      font-weight: 500;
      color: #222;
      flex: 1;
    }

    .group-count {
      font-size: 12px;
      color: #999;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 3px;
      margin: 0 8px;
    }

    .empty-state {
      padding: 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    .selection-summary {
      background: #f0f0f0;
      padding: 12px;
      border-radius: 4px;
      border-left: 4px solid #2196F3;
    }

    .selection-summary p {
      margin: 6px 0;
      font-size: 14px;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      padding: 10px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      gap: 12px;
      font-size: 13px;
    }

    .result-item.passed {
      border-color: #4caf50;
      background: #f1f8f4;
    }

    .result-item.failed {
      border-color: #f44336;
      background: #fdf1f0;
    }

    .result-status {
      font-weight: 600;
      font-size: 16px;
      min-width: 20px;
    }

    .result-item.passed .result-status {
      color: #4caf50;
    }

    .result-item.failed .result-status {
      color: #f44336;
    }

    .result-guid {
      font-family: monospace;
      color: #666;
      flex: 1;
    }

    .result-status-text {
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 3px;
      background: #f0f0f0;
      font-size: 12px;
    }

    .result-item.passed .result-status-text {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .result-item.failed .result-status-text {
      background: #ffebee;
      color: #c62828;
    }

    #status {
      margin-top: 12px;
      padding: 10px;
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      border-radius: 4px;
      font-size: 12px;
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="index.ts"></script>
</body>
</html>
